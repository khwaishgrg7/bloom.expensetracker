<section class="hero">

<h1>

Plan your money,<br>
before spending.

</h1>

<p>

Create monthly budgets and track progress.

</p>

</section>



<section class="budget-grid">

<div class="panel">

<h3>

Set Monthly Budget

</h3>

<form id="budgetForm">

<input
id="budgetInput"
type="number"
placeholder="Enter amount"
required>

<button>

Save Budget

</button>

</form>

</div>



<div class="panel">

<h3>

Current Status

</h3>

<h2 id="budget">
₹0
</h2>

<div class="progress">

<div id="fill">

</div>

</div>

<p id="remaining">

₹0 Remaining

</p>

</div>

</section>

</div>
