<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>Bloom Expense</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="container">
<nav>

<div class="logo">
Bloom.
</div>

<div class="links">

<a href="index.html">
Dashboard
</a>

<a href="transaction.html">
Transactions
</a>

<a href="analytics.html">
Analytics
</a>

<a
class="active"
href="budget.html">

Budget

</a>

</div>

</nav>



<section class="hero">

<h1>
Your money,<br>
beautifully organised.
</h1>

<p>
Track expenses in a calm and aesthetic space.
</p>

</section>



<section class="cards">

<div class="card">

<span>Balance</span>

<h2 id="balance">
₹0
</h2>

</div>

<div class="card">

<span>Income</span>

<h2 id="income">
₹0
</h2>

</div>

<div class="card">

<span>Expense</span>

<h2 id="expense">
₹0
</h2>

</div>

</section>



<section class="dashboard">

<div class="panel">

<h3>
Add Transaction
</h3>

<form id="form">

<input
id="title"
placeholder="Title"
required>

<input
id="amount"
type="number"
placeholder="Amount"
required>

<select id="category">

<option>Food</option>
<option>Shopping</option>
<option>Travel</option>
<option>Bills</option>
<option>Entertainment</option>

</select>

<select id="type">

<option>
Income
</option>

<option>
Expense
</option>

</select>

<button>
Save
</button>

</form>

</div>



<div class="panel">

<h3>
Recent Activity
</h3>

<div id="list">

</div>

</div>

</section>

</div>

<script src="main.js"></script>

</body>

</html>
